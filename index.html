<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My One Page Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background-image: url('images/background_image.png'); /* 替換成你的圖片路徑 */
      background-size: auto; /* 背景圖片會自動調整以覆蓋整個螢幕 */
      background-position: center; /* 背景圖片置中 */
      background-repeat: no-repeat; /* 防止背景圖片重複 */
      background-attachment: scroll; 
      color: white; /* 文字顏色設為白色，與背景形成對比 */
    }
    h1 {
      margin-top: 50px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); /* 增加文字陰影 */
    }
    p {
      font-size: 1.2rem;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5); /* 文字陰影使文字更清晰 */
    }
  </style>
</head>
<body>
  <h1>Welcome to My One Page Website</h1>
  <p>This is a simple one-page website hosted with Cloudflare Pages!</p>
</body>
</html>
