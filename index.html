<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Landing Page with Smooth Scroll</title>
  <style>
    /* 重置樣式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 網頁背景樣式 */
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('images/background_image_2.png'); /* 替換為您的背景圖片 */
      background-size: cover;
      background-position: center;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* 右上角按鈕樣式 */
    .nav-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .nav-buttons a {
      padding: 10px 15px;
      font-size: 0.9rem;
      color: white;
      background: rgba(0, 0, 0, 0.6); /* 按鈕背景透明效果 */
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .nav-buttons a:hover {
      background: rgba(255, 255, 255, 0.8);
      color: black;
      transform: scale(1.1);
    }

    /* 容器 */
    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.5); /* 背景透明效果 */
      padding: 20px 40px;
      border-radius: 15px;
    }

    /* 標題 */
    .container h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
    }

    /* 描述文字 */
    .container p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* 按鈕樣式 */
    .button {
      display: inline-block;
      padding: 10px 20px;
      font-size: 1.2rem;
      color: white;
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    /* 按鈕效果 */
    .button:hover {
      transform: scale(1.1);
      background: linear-gradient(90deg, #feb47b, #ff7e5f);
    }

    /* 錨點區域樣式 */
    section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: rgba(0, 0, 0, 0.7);
      color: white;
    }

    #about {
      background-color: #1abc9c;
    }

    #contact {
      background-color: #3498db;
    }

    #services {
      background-color: #9b59b6;
    }
  </style>
</head>
<body>
  <!-- 右上角按鈕 -->
  <div class="nav-buttons">
    <a href="#about">相關介紹</a>
    <a href="#contact">聯絡我們</a>
    <a href="#services">服務</a>
  </div>

  <!-- 中心內容 -->
  <div class="container">
    <h1>Welcome to My Website</h1>
    <p>Discover amazing features and services tailored just for you. Click the button below to learn more!</p>
    <a href="#" class="button">Get Started</a>
  </div>

  <!-- 下方錨點內容 -->
  <section id="about">
    <p>這是「相關介紹」的內容。</p>
  </section>
  <section id="contact">
    <p>這是「聯絡我們」的內容。</p>
  </section>
  <section id="services">
    <p>這是「服務」的內容。</p>
  </section>

  <!-- JavaScript: 滑動效果 -->
  <script>
    // 將所有導航按鈕加上滑動效果
    document.querySelectorAll('.nav-buttons a').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault(); // 防止直接跳轉
        const target = document.querySelector(this.getAttribute('href')); // 獲取目標錨點
        target.scrollIntoView({
          behavior: 'smooth', // 平滑滾動效果
          block: 'start' // 將目標對齊到視窗頂部
        });
      });
    });
  </script>
</body>
</html>
