<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Landing Page</title>
  <style>
    /* 重置樣式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 網頁背景樣式 */
    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: url('images/background_image.png'); /* 替換為您的背景圖片 */
      background-size: cover;
      background-position: center;
      color: white;
      font-family: Arial, sans-serif;
    }

    /* 容器 */
    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.5); /* 背景透明效果 */
      padding: 20px 40px;
      border-radius: 15px;
    }

    /* 標題 */
    .container h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
    }

    /* 描述文字 */
    .container p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* 按鈕樣式 */
    .button {
      display: inline-block;
      padding: 10px 20px;
      font-size: 1.2rem;
      color: white;
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    /* 按鈕效果 */
    .button:hover {
      transform: scale(1.1);
      background: linear-gradient(90deg, #feb47b, #ff7e5f);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My Website</h1>
    <p>Discover amazing features and services tailored just for you. Click the button below to learn more!</p>
    <a href="#" class="button">Get Started</a>
  </div>
</body>
</html>
