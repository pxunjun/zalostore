<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Background</title>
  <style>
    /* 基本樣式 */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%; /* 確保高度覆蓋全屏 */
    }

    /* 預設背景圖樣式（適用於桌面裝置） */
    body {
      background-image: url('images/background_images.jpg'); /* 替換為你的圖片路徑 */
      background-size: cover; /* 背景圖自動調整大小以覆蓋整個畫面 */
      background-position: center; /* 背景圖片置中 */
      background-repeat: no-repeat; /* 背景圖片不重複 */
    }

    /* 手機螢幕的背景圖設定 */
    @media (max-width: 768px) {
      body {
        background-size: contain; /* 確保手機畫面完全顯示整張圖片（不裁切） */
        background-position: top; /* 背景圖片靠上方對齊 */
      }
    }

    /* 極小裝置（例如 iPhone SE 或更小） */
    @media (max-width: 480px) {
      body {
        background-size: 100% auto; /* 寬度佔滿整個螢幕，高度自適應 */
        background-position: top center; /* 圖片置中並靠上方 */
      }
    }
  </style>
</head>
<body>
</body>
</html>
