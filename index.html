<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smooth Expanding Section</title>
  <style>
    /* 重置樣式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* 網頁背景樣式 */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-image: url('images/background_image.png'); /* 替換為您的背景圖片 */
      background-size: cover;
      background-position: center;
      color: white;
      font-family: Arial, sans-serif;
      padding: 50px 20px;
    }

    /* 右上角按鈕樣式 */
    .nav-buttons {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .nav-buttons a {
      padding: 10px 15px;
      font-size: 0.9rem;
      color: white;
      background: rgba(0, 0, 0, 0.6); /* 按鈕背景透明效果 */
      border-radius: 20px;
      text-decoration: none;
      transition: background 0.3s ease, transform 0.3s ease;
      cursor: pointer;
    }

    .nav-buttons a:hover {
      background: rgba(255, 255, 255, 0.8);
      color: black;
      transform: scale(1.1);
    }

     /* 按鈕樣式 */
    .button {
      display: inline-block;
      padding: 10px 20px;
      font-size: 1.2rem;
      color: white;
      background: linear-gradient(90deg, #ff7e5f, #feb47b);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    /* 按鈕效果 */
    .button:hover {
      transform: scale(1.1);
      background: linear-gradient(90deg, #feb47b, #ff7e5f);
    }

    /* 調整中心內容的垂直位置 */
    .container {
      text-align: center;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px 40px;
      border-radius: 15px;
      position: absolute;
      left: 50%;
      bottom: 5%; /* 永遠距離螢幕底部 5% */
      transform: translateX(-50%); /* 水平置中 */
      width: 80%;
      max-width: 800px;
    }
    
    /* 標題 */
    .container h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
    }

    /* 描述文字 */
    .container p {
      font-size: 1.2rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    
    /* 展開區域（預設為隱藏） */
    .expandable {
      width: 80%;
      max-width: 800px;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.9);
      color: black;
      border-radius: 10px;
      padding: 0;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.6s ease-out, opacity 0.6s ease-out, padding 0.3s ease;
    }

    /* 當展開時的樣式 */
    .expandable.open {
      max-height: 500px; /* 控制展開的最大高度 */
      opacity: 1;
      padding: 20px;
    }

    .image-container {
      display: flex;         /* 讓圖片在同一行排列 */
      justify-content: center; /* 水平置中 */
      gap: 20px;            /* 兩張圖片之間的間距 */
    }

    .image-container img {
      width: 120px;  /* 設定固定寬度 */
      height: auto;  /* 保持圖片原始比例 */
  }
  </style>
</head>
<body>
  <!-- 右上角按鈕 -->
  <div class="nav-buttons">
    <a href="#" id="contact-btn">聯絡我們</a>
    <a href="#" id="about-btn">相關介紹</a>
    <a href="#" id="services-btn">服務</a>
  </div>

  <!-- 中心內容 -->
  <div class="container">
    <h1>Welcome to My Website</h1>
    <p>Discover amazing features and services tailored just for you. Click the button below to learn more!</p>
    
    <!-- 使用 Flexbox 讓兩張圖片並排 -->
    <div class="image-container">
        <img src="images/product_1.png" alt="Image 1">
        <img src="images/product_2.png" alt="Image 2">
    </div>  
    
    <a href="#" class="button">Get Started</a>
  </div>

  <!-- 展開區塊 -->
  <div id="contact" class="expandable">
    <h2>聯絡我們</h2>
    <p>如果您有任何問題，請聯繫我們！</p>
    <p>Email: example@example.com</p>
    <p>Phone: +123 456 7890</p>
  </div>

  <div id="about" class="expandable">
    <h2>關於我們</h2>
    <p>這是一個介紹我們公司的區塊。</p>
  </div>

  <div id="services" class="expandable">
    <h2>我們的服務</h2>
    <p>我們提供最好的服務來滿足您的需求。</p>
  </div>

  <!-- JavaScript: 展開區塊 -->
  <script>
    function toggleSection(sectionId) {
      const section = document.getElementById(sectionId);
      
      // 檢查是否有 "open" 類別，如果有就收起
      if (section.classList.contains("open")) {
        section.classList.remove("open");
      } else {
        // 關閉其他已展開的區塊
        document.querySelectorAll('.expandable').forEach(sec => sec.classList.remove("open"));
        
        // 展開點擊的區塊
        section.classList.add("open");
      }
    }

    // 綁定按鈕點擊事件
    document.getElementById("contact-btn").addEventListener("click", function(e) {
      e.preventDefault();
      toggleSection("contact");
    });

    document.getElementById("about-btn").addEventListener("click", function(e) {
      e.preventDefault();
      toggleSection("about");
    });

    document.getElementById("services-btn").addEventListener("click", function(e) {
      e.preventDefault();
      toggleSection("services");
    });
  </script>
</body>
</html>
